<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Success Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- ===== HEADER BAR ===== -->
    <header>
        <h1>Dashboard Academic Health</h1>
    </header>


    <!-- ===== HERO SECTION ===== -->
    <section class="hero">
        <div class="hero-text">
            <h2>Achieve Your Best Student Life</h2>
            <p>
                Stay organized, healthy, and focused with helpful tools
                designed for student success.
            </p>

            <button>Get Started</button>
            <button class="secondary-btn">Learn More</button>
        </div>

        <div class="hero-image">
            <img src="student.jpg" alt="Student working on laptop">
        </div>
    </section>


    <!-- ===== MAIN DASHBOARD AREA ===== -->
    <main>

        <!-- Widget Cards -->
        <section class="widgets">

            <article class="card">Widget</article>
            <article class="card">Widget</article>
            <article class="card">Widget</article>

        </section>

        <!-- Widget Quote Section -->
        <section class="quote">
            <article>
                <h3>Widget Quote</h3>
                <p>"Small daily improvements lead to big results."</p>
            </article>
        </section>

    </main>


    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <h3>Advertisement</h3>
        <p>Check out student productivity tools.</p>
    </aside>


    <!-- ===== FOOTER ===== -->
    <footer>
        <p>Footer</p>
    </footer>

</body>
</html>
